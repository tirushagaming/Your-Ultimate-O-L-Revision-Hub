<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(
        135deg,
        #667eea 0%,
        #764ba2 25%,
        #6a11cb 50%,
        #2575fc 100%
    );
    background-size:400% 400%;
    animation: gradientBG 15s ease infinite;
    color:white;
    padding:30px;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    max-width:1200px;
    margin:auto;
}

.main-title{
    text-align:center;
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:0 0 20px rgba(255,255,255,.3);
}

.subtitle{
    text-align:center;
    margin-bottom:40px;
    opacity:.9;
}

.section{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:25px;
    margin-bottom:30px;
    box-shadow:0 8px 32px rgba(0,0,0,0.25);
    transition:0.3s;
}

.section:hover{
    transform:translateY(-5px);
}

.section-title{
    font-size:2rem;
    text-align:center;
    margin-bottom:20px;
    color:#fff;
}

.lesson{
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:18px;
    margin:20px 0;
}

.lesson h3{
    margin-bottom:15px;
}

.button-group{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.btn{
    text-decoration:none;
}

.btn button{
    border:none;
    padding:14px 24px;
    border-radius:50px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    color:white;
    transition:all .35s ease;
    position:relative;
    overflow:hidden;
}

.btn button::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.25);
    transition:0.5s;
}

.btn button:hover::before{
    left:100%;
}

.btn button:hover{
    transform:translateY(-4px) scale(1.05);
}

.primary{
    background:linear-gradient(45deg,#ff6b6b,#ff8e53);
    box-shadow:0 5px 20px rgba(255,107,107,.4);
}

.secondary{
    background:linear-gradient(45deg,#00c9ff,#92fe9d);
    box-shadow:0 5px 20px rgba(0,201,255,.4);
}

.ai{
    background:linear-gradient(45deg,#8e2de2,#4a00e0);
    box-shadow:0 5px 20px rgba(142,45,226,.4);
}

.special{
    background:linear-gradient(45deg,#f7971e,#ffd200);
    color:#222;
}

footer{
    text-align:center;
    margin-top:40px;
    opacity:0.8;
}

@media(max-width:768px){

    .main-title{
        font-size:2rem;
    }

    .button-group{
        flex-direction:column;
    }

    .btn button{
        width:100%;
    }

}

</style>
</head>
